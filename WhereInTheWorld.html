<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WhereInTheWorld</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/cesium@1.119/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<style>
  :root{
    --space:#060b16;
    --panel:rgba(9,16,29,0.86);
    --panel-line:rgba(143,161,184,0.22);
    --ink:#e8eef7;
    --dim:#8fa1b8;
    --amber:#ffc24b;          /* horizon amber — countries & focus */
    --contrail:#6fd3ff;       /* contrail blue — flights & live data */
    --radius:14px;
    font-size:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:var(--space);
    font-family:'Space Grotesk',system-ui,sans-serif;color:var(--ink)}
  #globe{position:absolute;inset:0}
  .cesium-viewer-bottom{left:8px;bottom:34px !important;opacity:.65}
  .cesium-widget-credits{font-size:10px !important}

  /* ---------- command panel ---------- */
  #panel{
    position:absolute;top:14px;left:14px;z-index:10;width:308px;max-width:calc(100vw - 28px);
    background:var(--panel);border:1px solid var(--panel-line);border-radius:var(--radius);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    box-shadow:0 10px 40px rgba(0,0,0,.5);
    padding:14px 16px 12px;
  }
  #brand{display:flex;align-items:baseline;gap:8px;margin-bottom:11px}
  #brand h1{font-size:1.06rem;font-weight:700;letter-spacing:.02em}
  #brand h1 em{font-style:normal;color:var(--amber)}
  #brand span{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--dim);letter-spacing:.14em;text-transform:uppercase}

  /* search */
  #searchwrap{position:relative}
  #search{
    width:100%;padding:9px 34px 9px 12px;border-radius:9px;border:1px solid var(--panel-line);
    background:rgba(6,11,22,.7);color:var(--ink);font:inherit;font-size:.92rem;outline:none;
    transition:border-color .15s;
  }
  #search::placeholder{color:var(--dim)}
  #search:focus-visible{border-color:var(--amber)}
  #searchwrap::after{content:'⌕';position:absolute;right:11px;top:50%;transform:translateY(-54%);
    color:var(--dim);font-size:1.05rem;pointer-events:none}
  #suggest{
    position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:20;display:none;
    background:var(--panel);border:1px solid var(--panel-line);border-radius:10px;overflow:hidden;
    backdrop-filter:blur(14px);max-height:264px;overflow-y:auto;
  }
  #suggest button{
    display:flex;width:100%;justify-content:space-between;align-items:center;gap:8px;
    padding:9px 12px;background:none;border:0;color:var(--ink);font:inherit;font-size:.9rem;
    cursor:pointer;text-align:left;
  }
  #suggest button .iso{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--dim)}
  #suggest button:hover,#suggest button.active{background:rgba(255,194,75,.13)}
  #suggest button:hover .iso,#suggest button.active .iso{color:var(--amber)}

  /* layer toggles */
  #layers{margin-top:13px;display:grid;gap:9px}
  .lrow{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .lrow .lname{font-size:.86rem}
  .lrow .lsub{display:block;font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--dim);margin-top:1px}
  .switch{position:relative;width:40px;height:22px;flex:none}
  .switch input{position:absolute;opacity:0;width:100%;height:100%;cursor:pointer;margin:0}
  .switch .tr{position:absolute;inset:0;border-radius:999px;background:rgba(143,161,184,.25);
    border:1px solid var(--panel-line);transition:background .18s}
  .switch .tr::before{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;
    background:var(--dim);transition:transform .18s,background .18s}
  .switch input:checked + .tr{background:rgba(255,194,75,.32);border-color:rgba(255,194,75,.5)}
  .switch input:checked + .tr::before{transform:translateX(18px);background:var(--amber)}
  .switch input:focus-visible + .tr{outline:2px solid var(--amber);outline-offset:2px}
  #t-flights:checked + .tr{background:rgba(111,211,255,.28);border-color:rgba(111,211,255,.5)}
  #t-flights:checked + .tr::before{background:var(--contrail)}

  /* day / night segmented */
  #daynight{display:flex;margin-top:13px;border:1px solid var(--panel-line);border-radius:9px;overflow:hidden}
  #daynight button{
    flex:1;padding:7px 0;background:none;border:0;color:var(--dim);font:inherit;font-size:.84rem;
    cursor:pointer;transition:background .15s,color .15s;
  }
  #daynight button:focus-visible{outline:2px solid var(--amber);outline-offset:-2px}
  #daynight button.on{background:rgba(255,194,75,.16);color:var(--amber);font-weight:500}
  #resetview{margin-top:11px;width:100%;padding:7px 0;border-radius:9px;border:1px solid var(--panel-line);
    background:none;color:var(--dim);font:inherit;font-size:.8rem;cursor:pointer}
  #resetview:hover{color:var(--ink);border-color:var(--dim)}
  #resetview:focus-visible{outline:2px solid var(--amber)}

  /* ---------- country plate (hover popup) ---------- */
  #plate{
    position:absolute;z-index:30;display:none;min-width:218px;max-width:264px;pointer-events:none;
    background:var(--panel);border:1px solid var(--panel-line);border-left:3px solid var(--amber);
    border-radius:10px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    box-shadow:0 8px 30px rgba(0,0,0,.55);padding:11px 14px 10px;
  }
  #plate h2{font-size:.98rem;font-weight:700;letter-spacing:.01em;line-height:1.2}
  #plate .iso{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--amber);letter-spacing:.18em;margin:2px 0 8px}
  #plate dl{display:grid;grid-template-columns:auto 1fr;gap:3px 14px}
  #plate dt{font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;align-self:baseline;padding-top:2px}
  #plate dd{font-family:'IBM Plex Mono',monospace;font-size:.82rem;text-align:right}
  #plate .note{margin-top:7px;font-size:.6rem;color:var(--dim);font-family:'IBM Plex Mono',monospace}

  /* ---------- instrument strip (signature) ---------- */
  #strip{
    position:absolute;left:0;right:0;bottom:0;z-index:10;display:flex;align-items:center;gap:18px;
    padding:6px 14px;background:linear-gradient(0deg,rgba(6,11,22,.92),rgba(6,11,22,.55) 80%,transparent);
    font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--dim);
    pointer-events:none;white-space:nowrap;overflow:hidden;
  }
  #strip b{color:var(--ink);font-weight:500}
  #strip .amber{color:var(--amber)}
  #strip .blue{color:var(--contrail)}
  #strip .sep{opacity:.35}

  /* ---------- loader / toast ---------- */
  #loader{position:absolute;inset:0;z-index:50;display:flex;flex-direction:column;gap:14px;
    align-items:center;justify-content:center;background:var(--space);transition:opacity .5s}
  #loader.gone{opacity:0;pointer-events:none}
  #loader .ring{width:54px;height:54px;border-radius:50%;border:2px solid rgba(255,194,75,.2);
    border-top-color:var(--amber);animation:spin 1s linear infinite}
  #loader p{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--dim);letter-spacing:.12em}
  @keyframes spin{to{transform:rotate(360deg)}}
  #toast{position:absolute;top:14px;right:14px;z-index:40;display:none;max-width:300px;
    background:var(--panel);border:1px solid var(--panel-line);border-radius:10px;
    padding:10px 14px;font-size:.8rem;color:var(--ink);backdrop-filter:blur(14px)}
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.01s !important;transition-duration:.01s !important}
  }
  @media (max-width:480px){
    #panel{width:calc(100vw - 28px)}
    #strip{font-size:.6rem;gap:10px}
  }
</style>
</head>
<body>
<div id="globe"></div>

<aside id="panel">
  <div id="brand">
    <h1>Where<em>In</em>The<em>World</em></h1><span>digital twin</span>
  </div>
  <div id="searchwrap">
    <input id="search" type="text" placeholder="Search a country…" autocomplete="off"
           spellcheck="false" aria-label="Search a country" role="combobox" aria-expanded="false">
    <div id="suggest" role="listbox"></div>
  </div>
  <div id="layers">
    <div class="lrow">
      <label class="lname" for="t-clouds">Cloud cover<span class="lsub">procedural layer · 60 km</span></label>
      <span class="switch"><input type="checkbox" id="t-clouds"><span class="tr"></span></span>
    </div>
    <div class="lrow">
      <label class="lname" for="t-flights">Flight traffic<span class="lsub" id="flightsub">live via OpenSky</span></label>
      <span class="switch"><input type="checkbox" id="t-flights"><span class="tr"></span></span>
    </div>
  </div>
  <div id="daynight" role="group" aria-label="Day or night view">
    <button id="b-day" class="on">☀ Day</button>
    <button id="b-night">☾ Night</button>
  </div>
  <button id="resetview">Reset to orbit view</button>
</aside>

<div id="plate" aria-hidden="true">
  <h2 id="p-name"></h2>
  <div class="iso" id="p-iso"></div>
  <dl>
    <dt>Area</dt><dd id="p-area"></dd>
    <dt>Population</dt><dd id="p-pop"></dd>
    <dt>GDP</dt><dd id="p-gdp"></dd>
  </dl>
  <div class="note">approx. recent estimates</div>
</div>

<div id="strip">
  <span>LAT <b id="s-lat">—</b></span>
  <span class="sep">|</span>
  <span>LON <b id="s-lon">—</b></span>
  <span class="sep">|</span>
  <span>ALT <b id="s-alt">—</b></span>
  <span class="sep">|</span>
  <span class="amber" id="s-focus">orbit</span>
  <span class="sep">|</span>
  <span class="blue" id="s-flights"></span>
</div>

<div id="toast"></div>

<div id="loader">
  <div class="ring"></div>
  <p>SPINNING UP THE PLANET…</p>
</div>

<script>window.CESIUM_BASE_URL='https://cdn.jsdelivr.net/npm/cesium@1.119/Build/Cesium/';</script>

/* ---------------- night mode (NASA city lights) ---------------- */
let nightLayer=null,mode='day';
function setMode(m){
  if(m===mode)return;
  mode=m;
  $('b-day').classList.toggle('on',m==='day');
  $('b-night').classList.toggle('on',m==='night');
  if(m==='night'){
    if(!nightLayer){
      nightLayer=viewer.imageryLayers.addImageryProvider(
        new Cesium.UrlTemplateImageryProvider({url:NIGHT_URL,credit:'NASA GIBS · VIIRS city lights',maximumLevel:8})
      );
    }
    nightLayer.show=true;
    scene.skyAtmosphere.brightnessShift=-0.7;
    scene.globe.showGroundAtmosphere=false;
  }else{
    if(nightLayer)nightLayer.show=false;
    osmLayer.alpha=1;
    scene.skyAtmosphere.brightnessShift=0;
    scene.globe.showGroundAtmosphere=true;
  }
  applyAltitudeFades();
  scene.requestRender();
}
$('b-day').onclick=()=>setMode('day');
$('b-night').onclick=()=>setMode('night');

/* ---------------- procedural cloud layer ---------------- */
function makeCloudCanvas(){
  const c=document.createElement('canvas');c.width=2048;c.height=1024;
  const x=c.getContext('2d');
  x.clearRect(0,0,c.width,c.height);
  // big soft systems, biased toward temperate + tropical bands
  for(let i=0;i<340;i++){
    const lat=(Math.random()*2-1);                         // -1..1
    const band=Math.exp(-Math.pow((Math.abs(lat)-0.45)/0.5,2))*0.7+Math.exp(-Math.pow(lat/0.18,2))*0.5;
    if(Math.random()>band+0.12)continue;
    const cx=Math.random()*c.width, cy=(lat*0.5+0.5)*c.height;
    const r=24+Math.random()*120;
    const g=x.createRadialGradient(cx,cy,0,cx,cy,r);
    const a=0.05+Math.random()*0.22;
    g.addColorStop(0,`rgba(255,255,255,${a})`);
    g.addColorStop(0.6,`rgba(255,255,255,${a*0.5})`);
    g.addColorStop(1,'rgba(255,255,255,0)');
    x.fillStyle=g;x.beginPath();x.arc(cx,cy,r,0,Math.PI*2);x.fill();
  }
  // wispy detail
  for(let i=0;i<900;i++){
    const cx=Math.random()*c.width,cy=Math.random()*c.height,r=4+Math.random()*22;
    const g=x.createRadialGradient(cx,cy,0,cx,cy,r);
    const a=0.03+Math.random()*0.1;
    g.addColorStop(0,`rgba(255,255,255,${a})`);g.addColorStop(1,'rgba(255,255,255,0)');
    x.fillStyle=g;x.beginPath();x.arc(cx,cy,r,0,Math.PI*2);x.fill();
  }
  return c;
}
const CLOUD_R=6378137+60000;
const cloudEntity=viewer.entities.add({
  position:new Cesium.ConstantPositionProperty(Cesium.Cartesian3.ZERO),
  show:false,
  ellipsoid:{
    radii:new Cesium.Cartesian3(CLOUD_R,CLOUD_R,CLOUD_R-21000),
    material:new Cesium.ImageMaterialProperty({image:makeCloudCanvas(),transparent:true}),
    outline:false,slicePartitions:96,stackPartitions:48
  }
});
$('t-clouds').addEventListener('change',e=>{
  cloudEntity.show=e.target.checked&&cameraHeight()>CLOUD_FADE_ALT;
  scene.requestRender();
});

/* ---------------- flight traffic ---------------- */
const flightPoints=scene.primitives.add(new Cesium.PointPrimitiveCollection());
flightPoints.show=false;
let simTimer=null,simFlights=null;
const FLIGHT_COLOR=Cesium.Color.fromCssColorString('#6fd3ff');

function clearFlights(){
  flightPoints.removeAll();
  if(simTimer){clearInterval(simTimer);simTimer=null;}
  $('s-flights').textContent='';
}
async function loadFlights(){
  clearFlights();
  $('flightsub').textContent='contacting OpenSky…';
  try{
    const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),12000);
    const r=await fetch(OPENSKY_URL,{signal:ctrl.signal});clearTimeout(to);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    const states=(d.states||[]).filter(s=>s[5]!=null&&s[6]!=null);
    if(!states.length)throw new Error('empty');
    const max=2500,step=Math.max(1,Math.floor(states.length/max));
    let n=0;
    for(let i=0;i<states.length;i+=step){
      const s=states[i];
      flightPoints.add({
        position:Cesium.Cartesian3.fromDegrees(s[5],s[6],(s[7]||s[13]||10000)),
        pixelSize:2.6,color:FLIGHT_COLOR,
        scaleByDistance:new Cesium.NearFarScalar(2e5,2.2,2e7,0.7)
      });
      n++;
    }
    $('flightsub').textContent='live via OpenSky';
    $('s-flights').textContent='✈ '+n.toLocaleString()+' live aircraft';
  }catch(err){
    simulateFlights();
    $('flightsub').textContent='simulated (OpenSky busy)';
    toast('Live flight feed unavailable right now — showing simulated great-circle traffic instead.');
  }
  scene.requestRender();
}
function simulateFlights(){
  const hubs=[[-93.2,44.9],[-87.9,41.98],[-73.8,40.6],[-118.4,33.9],[-122.4,37.6],[-104.7,39.8],
    [-0.45,51.47],[2.55,49.0],[8.57,50.05],[4.76,52.31],[-3.57,40.49],[12.25,41.8],
    [28.75,41.27],[55.36,25.25],[51.61,25.27],[77.1,28.55],[72.87,19.09],[100.75,13.69],
    [103.99,1.36],[113.91,22.31],[121.8,31.15],[116.6,40.07],[139.78,35.55],[126.45,37.46],
    [151.18,-33.95],[144.84,-37.67],[-43.25,-22.81],[-58.54,-34.82],[-99.07,19.44],[18.6,-33.97],
    [36.85,-1.32],[31.4,30.12],[-79.63,43.68],[-123.18,49.19],[174.78,-37.0],[67.0,24.9]];
  simFlights=[];
  for(let i=0;i<220;i++){
    const a=hubs[Math.floor(Math.random()*hubs.length)];
    let b=hubs[Math.floor(Math.random()*hubs.length)];
    if(b===a)b=hubs[(hubs.indexOf(a)+7)%hubs.length];
    const geo=new Cesium.EllipsoidGeodesic(
      Cesium.Cartographic.fromDegrees(a[0],a[1]),Cesium.Cartographic.fromDegrees(b[0],b[1]));
    const pt=flightPoints.add({
      position:Cesium.Cartesian3.fromDegrees(a[0],a[1],10500),
      pixelSize:2.6,color:FLIGHT_COLOR,
      scaleByDistance:new Cesium.NearFarScalar(2e5,2.2,2e7,0.7)
    });
    simFlights.push({geo,pt,f:Math.random(),v:0.0018+Math.random()*0.004});
  }
  $('s-flights').textContent='✈ '+simFlights.length+' simulated aircraft';
  simTimer=setInterval(()=>{
    if(!flightPoints.show)return;
    for(const fl of simFlights){
      fl.f+=fl.v;if(fl.f>1)fl.f-=1;
      const c=fl.geo.interpolateUsingFraction(fl.f);
      fl.pt.position=Cesium.Cartesian3.fromRadians(c.longitude,c.latitude,10500);
    }
    scene.requestRender();
  },1000);
}
$('t-flights').addEventListener('change',e=>{
  flightPoints.show=e.target.checked;
  if(e.target.checked)loadFlights();else{clearFlights();$('flightsub').textContent='live via OpenSky';}
  scene.requestRender();
});

/* ---------------- countries: borders, hover, stats ---------------- */
const featureByName=new Map(),featureById=new Map(),searchIndex=[];
const outlineDS=new Cesium.CustomDataSource('outlines');
viewer.dataSources.add(outlineDS);
const BASE_FILL=Cesium.Color.WHITE.withAlpha(0.008);
const HOVER_FILL=Cesium.Color.fromCssColorString('#ffc24b').withAlpha(0.20);
const OUTLINE_COLOR=Cesium.Color.fromCssColorString('#ffc24b');
let countryDS=null,hovered=null;

function ringsOf(feature){
  const g=feature.geometry,rings=[];
  if(g.type==='Polygon')rings.push(g.coordinates[0]);
  else if(g.type==='MultiPolygon')for(const p of g.coordinates)rings.push(p[0]);
  return rings;
}
function bboxOf(feature){
  let lats=[],lons=[];
  for(const ring of ringsOf(feature))for(const[lo,la]of ring){lons.push(lo);lats.push(la);}
  let w=Math.min(...lons),e=Math.max(...lons);
  const s=Math.min(...lats),n=Math.max(...lats);
  if(e-w>180){ // crosses the antimeridian — rebuild in 0..360 space
    const l2=lons.map(l=>l<0?l+360:l);
    w=Math.min(...l2);e=Math.max(...l2);
    if(w>180)w-=360; if(e>180)e-=360;
  }
  return{w,s,e,n};
}
function showOutline(feature){
  outlineDS.entities.removeAll();
  if(!feature)return;
  let count=0;
  for(const ring of ringsOf(feature)){
    if(++count>80)break;
    if(ring.length<3)continue;
    const flat=[];
    for(const[lo,la]of ring){flat.push(lo,la);}
    outlineDS.entities.add({polyline:{
      positions:Cesium.Cartesian3.fromDegreesArray(flat),
      clampToGround:true,width:2.6,
      material:OUTLINE_COLOR
    }});
  }
}
function statsFor(feature){
  return STATS[feature.id]||null;
}
function showPlate(feature,x,y){
  const st=statsFor(feature);
  $('p-name').textContent=feature.properties.name;
  $('p-iso').textContent=(feature.id&&feature.id!=='-99')?feature.id:'···';
  $('p-area').textContent=fmtArea(st?st.a:null);
  $('p-pop').textContent=fmtPop(st?st.p:null);
  $('p-gdp').textContent=fmtGdp(st?st.g:null);
  const pl=$('plate');pl.style.display='block';
  const pw=pl.offsetWidth,ph=pl.offsetHeight,vw=innerWidth,vh=innerHeight;
  let px=x+18,py=y+18;
  if(px+pw>vw-10)px=x-pw-14;
  if(py+ph>vh-44)py=y-ph-14;
  pl.style.left=Math.max(8,px)+'px';pl.style.top=Math.max(8,py)+'px';
}
function hidePlate(){$('plate').style.display='none';}

function setHover(entity,x,y){
  if(entity===hovered){
    if(entity)showPlate(featureOf(entity),x,y);
    return;
  }
  if(hovered&&hovered.polygon)hovered.polygon.material=BASE_FILL;
  hovered=entity;
  if(entity){
    if(entity.polygon)entity.polygon.material=HOVER_FILL;
    const f=featureOf(entity);
    showOutline(f);showPlate(f,x,y);
    $('s-focus').textContent=f.properties.name.toLowerCase();
  }else{
    showOutline(null);hidePlate();
    $('s-focus').textContent='orbit';
  }
  scene.requestRender();
}
function featureOf(entity){
  const nm=entity.properties&&entity.properties.name?entity.properties.name.getValue():null;
  return featureByName.get(nm)||null;
}

async function loadCountries(){
  const r=await fetch(GEOJSON_URL);
  if(!r.ok)throw new Error('borders HTTP '+r.status);
  const gj=await r.json();
  for(const f of gj.features){
    featureByName.set(f.properties.name,f);
    if(f.id)featureById.set(f.id,f);
    f._bbox=bboxOf(f);
    searchIndex.push({name:f.properties.name,iso:f.id||'',f});
  }
  searchIndex.sort((a,b)=>a.name.localeCompare(b.name));
  countryDS=await Cesium.GeoJsonDataSource.load(gj,{
    clampToGround:true,fill:BASE_FILL,stroke:Cesium.Color.TRANSPARENT
  });
  await viewer.dataSources.add(countryDS);
}

/* hover / tap picking */
const handler=new Cesium.ScreenSpaceEventHandler(scene.canvas);
function pickCountry(pos){
  const picked=scene.pick(pos);
  if(picked&&picked.id instanceof Cesium.Entity&&countryDS&&
     countryDS.entities.contains(picked.id)&&featureOf(picked.id))return picked.id;
  return null;
}
let lastMove=0;
handler.setInputAction(m=>{
  const now=performance.now();
  if(now-lastMove<40)return;        // throttle picking
  lastMove=now;
  setHover(pickCountry(m.endPosition),m.endPosition.x,m.endPosition.y);
},Cesium.ScreenSpaceEventType.MOUSE_MOVE);
handler.setInputAction(c=>{          // tap support on touch devices
  const e=pickCountry(c.position);
  setHover(e,c.position.x,c.position.y);
},Cesium.ScreenSpaceEventType.LEFT_CLICK);

/* ---------------- search with autocomplete ---------------- */
const searchEl=$('search'),suggEl=$('suggest');
let suggItems=[],activeIdx=-1;
function renderSuggest(items){
  suggItems=items;activeIdx=-1;
  if(!items.length){suggEl.style.display='none';searchEl.setAttribute('aria-expanded','false');return;}
  suggEl.innerHTML='';
  items.forEach((it,i)=>{
    const b=document.createElement('button');
    b.type='button';b.setAttribute('role','option');
    b.innerHTML=`<span>${it.name}</span><span class="iso">${it.iso&&it.iso!=='-99'?it.iso:''}</span>`;
    b.addEventListener('click',()=>selectCountry(it));
    suggEl.appendChild(b);
  });
  suggEl.style.display='block';searchEl.setAttribute('aria-expanded','true');
}
function markActive(){
  [...suggEl.children].forEach((c,i)=>c.classList.toggle('active',i===activeIdx));
  if(activeIdx>=0)suggEl.children[activeIdx].scrollIntoView({block:'nearest'});
}
searchEl.addEventListener('input',()=>{
  const q=searchEl.value.trim().toLowerCase();
  if(!q){renderSuggest([]);return;}
  const starts=[],contains=[];
  for(const it of searchIndex){
    const n=it.name.toLowerCase();
    if(n.startsWith(q))starts.push(it);
    else if(n.includes(q)||it.iso.toLowerCase()===q)contains.push(it);
  }
  renderSuggest(starts.concat(contains).slice(0,8));
});
searchEl.addEventListener('keydown',e=>{
  if(suggEl.style.display!=='block')return;
  if(e.key==='ArrowDown'){e.preventDefault();activeIdx=Math.min(activeIdx+1,suggItems.length-1);markActive();}
  else if(e.key==='ArrowUp'){e.preventDefault();activeIdx=Math.max(activeIdx-1,0);markActive();}
  else if(e.key==='Enter'){e.preventDefault();selectCountry(suggItems[Math.max(activeIdx,0)]);}
  else if(e.key==='Escape'){renderSuggest([]);}
});
document.addEventListener('click',e=>{
  if(!e.target.closest('#searchwrap'))renderSuggest([]);
});
function selectCountry(it){
  if(!it)return;
  searchEl.value=it.name;renderSuggest([]);searchEl.blur();
  flyToFeature(it.f);
}
function flyToFeature(f){
  const b=f._bbox;
  const padLon=Math.max((((b.e-b.w)+360)%360)*0.12,0.4);
  const padLat=Math.max((b.n-b.s)*0.12,0.4);
  const rect=Cesium.Rectangle.fromDegrees(b.w-padLon,Math.max(b.s-padLat,-89),
                                          b.e+padLon,Math.min(b.n+padLat,89));
  const reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
  camera.flyTo({destination:rect,duration:reduced?0.2:2.0,
    complete:()=>{
      // highlight + plate pinned near the top of the view
      const ent=entityForFeature(f);
      setHover(ent,innerWidth/2,Math.min(140,innerHeight*0.25));
    }});
  $('s-focus').textContent=f.properties.name.toLowerCase();
}
function entityForFeature(f){
  if(!countryDS)return null;
  for(const e of countryDS.entities.values){
    if(e.properties&&e.properties.name&&e.properties.name.getValue()===f.properties.name)return e;
  }
  return null;
}

/* ---------------- instrument strip + altitude fades ---------------- */
const CLOUD_FADE_ALT=110000;
function cameraHeight(){return camera.positionCartographic.height;}
function applyAltitudeFades(){
  const h=cameraHeight();
  // ducking under the cloud deck shouldn't leave you inside fog
  if($('t-clouds').checked)cloudEntity.show=h>CLOUD_FADE_ALT;
  // at street level, let OSM shine through the night layer so streets stay visible
  if(mode==='night'&&nightLayer){
    const t=Math.min(Math.max((h-50000)/250000,0),1); // 0 near ground → 1 in orbit
    nightLayer.alpha=0.25+0.75*t;
    osmLayer.alpha=1;
  }
}
camera.percentageChanged=0.03;
camera.changed.addEventListener(()=>{
  const c=camera.positionCartographic;
  $('s-lat').textContent=Cesium.Math.toDegrees(c.latitude).toFixed(3)+'°';
  $('s-lon').textContent=Cesium.Math.toDegrees(c.longitude).toFixed(3)+'°';
  const h=c.height;
  $('s-alt').textContent=h>=1e6?(h/1e6).toFixed(2)+' Mm':h>=1000?(h/1000).toFixed(1)+' km':Math.round(h)+' m';
  applyAltitudeFades();
});

$('resetview').addEventListener('click',()=>{
  setHover(null,0,0);
  camera.flyTo({destination:HOME,duration:1.6});
});

/* ---------------- boot ---------------- */
(async()=>{
  try{await loadCountries();}
  catch(err){toast('Country borders failed to load ('+err.message+'). Check your connection and refresh.');}
  $('loader').classList.add('gone');
  camera.changed.raiseEvent();
  scene.requestRender();
})();
</script>
